version: 2

project_name: acmehub-cli

builds:
  - main: ./main.go
    binary: acmehub-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/geektr-cloud/acme-hub/integrations/acmehub-cli/cmd.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
