apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "acmehub-syncer.fullname" . }}
  labels:
    {{- include "acmehub-syncer.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["acme.geektr.cloud"]
    resources: ["acmehubcertificates", "acmehubconsumers", "clusteracmehubconsumers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["acme.geektr.cloud"]
    resources: ["acmehubcertificates/status", "acmehubconsumers/status", "clusteracmehubconsumers/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["acme.geektr.cloud"]
    resources: ["acmehubcertificates/finalizers", "acmehubconsumers/finalizers", "clusteracmehubconsumers/finalizers"]
    verbs: ["update"]
