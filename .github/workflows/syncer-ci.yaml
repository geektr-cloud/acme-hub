name: Syncer CI

on:
  push:
    branches: [main]
    paths:
      - "integrations/kubernetes/**"
      - ".github/workflows/syncer-ci.yaml"
  pull_request:
    branches: [main]
    paths:
      - "integrations/kubernetes/**"
      - ".github/workflows/syncer-ci.yaml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/kubernetes
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
          cache: true
          cache-dependency-path: integrations/kubernetes/go.sum

      - name: Vet
        run: go vet ./...

      - name: Setup envtest
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.19
          KUBEBUILDER_ASSETS="$(setup-envtest use 1.31.0 --bin-dir /usr/local/bin -p path)"
          echo "KUBEBUILDER_ASSETS=$KUBEBUILDER_ASSETS" >> "$GITHUB_ENV"

      - name: Test
        run: make test
        env:
          KUBEBUILDER_ASSETS: ${{ env.KUBEBUILDER_ASSETS }}
