name: CLI Release

on:
  push:
    tags:
      - "integrations/acmehub-cli/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: integrations/acmehub-cli/go.sum

      - name: Create semver tag for goreleaser
        run: |
          VERSION="${GITHUB_REF_NAME##*/}"
          git tag -f "$VERSION"

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          workdir: integrations/acmehub-cli
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
