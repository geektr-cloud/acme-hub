name: Syncer Release

on:
  push:
    tags:
      - "integrations/kubernetes/v*"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Strip tag prefix
        run: echo "VERSION=${GITHUB_REF_NAME##*/}" >> "$GITHUB_ENV"

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: integrations/kubernetes
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/acmehub-syncer:${{ env.VERSION }}
            ghcr.io/${{ github.repository }}/acmehub-syncer:latest

  helm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: docker
    steps:
      - uses: actions/checkout@v7

      - name: Strip tag prefix
        run: |
          VERSION="${GITHUB_REF_NAME##*/}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "CHART_VERSION=${VERSION#v}" >> "$GITHUB_ENV"

      - uses: azure/setup-helm@v5

      - name: Package Helm Chart
        run: |
          mkdir -p .helm-publish
          helm package integrations/kubernetes/charts/acmehub-syncer \
            --version "$CHART_VERSION" \
            --app-version "$CHART_VERSION" \
            --destination .helm-publish

      - name: Generate Helm index
        run: |
          helm repo index .helm-publish \
            --url https://geektr-cloud.github.io/acme-hub

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .helm-publish
          keep_files: true
