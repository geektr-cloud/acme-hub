name: Caddy Release

on:
  push:
    tags:
      - "integrations/caddy/v*"

jobs:
  binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: integrations/caddy/go.sum

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build caddy binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          xcaddy build --with github.com/geektr-cloud/acme-hub/integrations/caddy=./integrations/caddy
          mv caddy caddy-acmehub_${{ matrix.os }}_${{ matrix.arch }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: caddy-acmehub_${{ matrix.os }}_${{ matrix.arch }}

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Strip tag prefix
        run: echo "VERSION=${GITHUB_REF_NAME##*/}" >> "$GITHUB_ENV"

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: integrations/caddy
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/caddy:${{ env.VERSION }}
            ghcr.io/${{ github.repository }}/caddy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
