name: Caddy Release

on:
  push:
    tags:
      - "integrations/caddy/v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build caddy binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          xcaddy build --with github.com/geektr-cloud/acme-hub/integrations/caddy=./integrations/caddy
          mv caddy caddy-acmehub_${{ matrix.os }}_${{ matrix.arch }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: caddy-acmehub_${{ matrix.os }}_${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
